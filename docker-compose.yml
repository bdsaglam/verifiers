version: '3.8'

services:
  jupyter-kernel:
    build:
      context: ./services/
      dockerfile: jupyter_codex.Dockerfile
    ports:
      - "9999:8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/kernels"]
      interval: 10s
      timeout: 5s
      retries: 3 
  
  rerank:
    build:
      context: ./services/rerank/
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - DEFAULT_MODEL=t5
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 