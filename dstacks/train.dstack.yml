type: task
# The name is optional, if not specified, generated randomly
name: agent-rl-train

# Size of the cluster
nodes: 1

python: "3.11"
nvcc: true


env:
  - HF_TOKEN=
  - WANDB_API_KEY=
  - WANDB_PROJECT="agent-rl"
  - ACCELERATE_LOG_LEVEL=info

commands:
  - pip install -e '.[retrieve]'
  - accelerate launch 
    --config-file configs/zero3.yaml 
    --num-processes 2 
    examples/musique_agent.py
    --model 'meta-llama/Llama-3.1-8B-Instruct'
    --n-env-jobs 32
    --retriever bm25
    2>&1 | tee train.log
  - huggingface-cli upload 
    --repo-type model 
    bdsaglam/Llama-3.1-8B-Instruct-ragent-lora
    ./outputs/ragent-Llama-3.1-8B-Instruct-musique-grpo
  
resources:
  memory: 50GB..
  gpu:
    # 24GB or more vRAM
    memory: 80GB..
    # One or more GPU
    count: 3
  # Shared memory (for multi-gpu)
  shm_size: 24GB
